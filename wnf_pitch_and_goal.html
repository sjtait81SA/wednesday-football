
<style>
@import url('https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Figtree',sans-serif;background:#f5f5f0}
.wrap{max-width:480px;margin:0 auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.card{background:#fff;border-radius:16px;border:0.5px solid #e8e8e8;padding:16px}
.lbl{font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.hint{font-size:12px;color:#999;text-align:center;margin-top:8px}
.quip{background:#f5f5f0;border-radius:10px;padding:12px 14px;font-size:13px;color:#333;font-weight:600;display:flex;align-items:center}
.rbtn{background:#111;color:#fff;border:none;border-radius:10px;padding:11px;font-family:'Figtree',sans-serif;font-weight:700;font-size:13px;cursor:pointer;width:100%}
.srow{display:flex;gap:6px;margin-bottom:4px}
.st{flex:1;height:3px;border-radius:2px;background:#e0e0e0}
.st.done{background:#111}.st.active{background:#f0c040}
</style>

<div class="wrap">
  <div class="srow">
    <div class="st done"></div>
    <div class="st active" id="s2"></div>
    <div class="st" id="s3"></div>
  </div>

  <div class="card" id="pitch-card">
    <div class="lbl">Where on the pitch did you shoot from?</div>
    <svg id="pitch-svg" viewBox="0 0 300 200" style="width:100%;display:block;cursor:crosshair;border-radius:10px" onclick="onPitch(event)">
      <!-- Base pitch -->
      <rect width="300" height="200" fill="#2e8b3a"/>
      <!-- Subtle stripes -->
      <rect x="0"   y="0" width="37" height="200" fill="#287834" opacity="0.6"/>
      <rect x="75"  y="0" width="37" height="200" fill="#287834" opacity="0.6"/>
      <rect x="150" y="0" width="37" height="200" fill="#287834" opacity="0.6"/>
      <rect x="225" y="0" width="37" height="200" fill="#287834" opacity="0.6"/>

      <!-- Pitch border -->
      <rect x="4" y="4" width="292" height="192" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>

      <!-- Halfway line -->
      <line x1="4" y1="100" x2="296" y2="100" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>

      <!-- LEFT GOAL (your goal) -->
      <!-- Goal net area -->
      <rect x="0" y="82" width="18" height="36" fill="#1a5e24" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
      <!-- Net lines -->
      <line x1="6"  y1="82" x2="6"  y2="118" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
      <line x1="12" y1="82" x2="12" y2="118" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
      <line x1="0"  y1="91" x2="18" y2="91"  stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
      <line x1="0"  y1="100" x2="18" y2="100" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
      <line x1="0"  y1="109" x2="18" y2="109" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
      <!-- GK box -->
      <rect x="4" y="72" width="28" height="56" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1"/>
      <!-- Posts -->
      <line x1="4" y1="82" x2="4" y2="118" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <line x1="18" y1="82" x2="4" y2="82" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <line x1="18" y1="118" x2="4" y2="118" stroke="#fff" stroke-width="3" stroke-linecap="round"/>

      <!-- RIGHT GOAL (their goal) -->
      <rect x="282" y="82" width="18" height="36" fill="#1a5e24" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
      <line x1="288" y1="82" x2="288" y2="118" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
      <line x1="294" y1="82" x2="294" y2="118" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
      <line x1="282" y1="91"  x2="300" y2="91"  stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
      <line x1="282" y1="100" x2="300" y2="100" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
      <line x1="282" y1="109" x2="300" y2="109" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
      <!-- GK box -->
      <rect x="268" y="72" width="28" height="56" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1"/>
      <!-- Posts -->
      <line x1="296" y1="82" x2="296" y2="118" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <line x1="282" y1="82" x2="296" y2="82"  stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <line x1="282" y1="118" x2="296" y2="118" stroke="#fff" stroke-width="3" stroke-linecap="round"/>

      <!-- Labels -->
      <text x="22" y="14" fill="rgba(255,255,255,0.55)" font-family="Figtree,sans-serif" font-size="7" font-weight="700">YOUR GOAL</text>
      <text x="278" y="14" fill="rgba(255,255,255,0.55)" font-family="Figtree,sans-serif" font-size="7" font-weight="700" text-anchor="end">THEIR GOAL</text>

      <!-- Tap dot -->
      <circle id="pdot" cx="-99" cy="-99" r="6" fill="#f0c040" stroke="#fff" stroke-width="2" opacity="0"/>
    </svg>
    <div class="hint">Tap where you were when you scored</div>
  </div>

  <div class="card" id="goal-card" style="display:none">
    <div class="lbl">Where did it go in?</div>
    <svg id="goal-svg" viewBox="0 0 400 150" style="width:100%;display:block;cursor:crosshair;border-radius:10px" onclick="onGoalTap(event)">
      <!-- Sky -->
      <rect width="400" height="150" fill="#7ab8d4"/>
      <!-- Astroturf -->
      <rect y="108" width="400" height="42" fill="#2e8b3a"/>
      <rect y="108" x="0"   width="50" height="42" fill="#287834" opacity="0.5"/>
      <rect y="108" x="100" width="50" height="42" fill="#287834" opacity="0.5"/>
      <rect y="108" x="200" width="50" height="42" fill="#287834" opacity="0.5"/>
      <rect y="108" x="300" width="50" height="42" fill="#287834" opacity="0.5"/>
      <!-- Goal line -->
      <line x1="0" y1="116" x2="400" y2="116" stroke="rgba(255,255,255,0.7)" stroke-width="2"/>

      <!-- Net background (dark inside goal) -->
      <rect x="18" y="28" width="364" height="88" fill="#0d2010"/>
      <!-- Net vertical lines -->
      <line x1="62"  y1="28" x2="62"  y2="116" stroke="rgba(255,255,255,0.15)" stroke-width="0.8"/>
      <line x1="106" y1="28" x2="106" y2="116" stroke="rgba(255,255,255,0.15)" stroke-width="0.8"/>
      <line x1="150" y1="28" x2="150" y2="116" stroke="rgba(255,255,255,0.15)" stroke-width="0.8"/>
      <line x1="194" y1="28" x2="194" y2="116" stroke="rgba(255,255,255,0.15)" stroke-width="0.8"/>
      <line x1="238" y1="28" x2="238" y2="116" stroke="rgba(255,255,255,0.15)" stroke-width="0.8"/>
      <line x1="282" y1="28" x2="282" y2="116" stroke="rgba(255,255,255,0.15)" stroke-width="0.8"/>
      <line x1="326" y1="28" x2="326" y2="116" stroke="rgba(255,255,255,0.15)" stroke-width="0.8"/>
      <line x1="370" y1="28" x2="370" y2="116" stroke="rgba(255,255,255,0.15)" stroke-width="0.8"/>
      <!-- Net horizontal lines -->
      <line x1="18" y1="50"  x2="382" y2="50"  stroke="rgba(255,255,255,0.15)" stroke-width="0.8"/>
      <line x1="18" y1="72"  x2="382" y2="72"  stroke="rgba(255,255,255,0.15)" stroke-width="0.8"/>
      <line x1="18" y1="94"  x2="382" y2="94"  stroke="rgba(255,255,255,0.15)" stroke-width="0.8"/>

      <!-- Posts — white, thick, 5-a-side proportions -->
      <!-- Left post -->
      <rect x="10" y="24" width="8" height="92" rx="3" fill="#f0f0f0"/>
      <!-- Right post -->
      <rect x="382" y="24" width="8" height="92" rx="3" fill="#f0f0f0"/>
      <!-- Crossbar -->
      <rect x="10" y="22" width="380" height="8" rx="3" fill="#f0f0f0"/>
      <!-- Ground bar (base) -->
      <rect x="10" y="114" width="380" height="4" rx="2" fill="rgba(220,220,220,0.6)"/>

      <!-- Shot marker -->
      <circle id="sglow" cx="-99" cy="-99" r="22" fill="#f0c040" opacity="0"/>
      <circle id="smark" cx="-99" cy="-99" r="10" fill="#f0c040" stroke="#fff" stroke-width="2.5" opacity="0"/>
    </svg>
    <div class="hint">Tap where it went in</div>
  </div>

  <div class="quip" id="quip" style="display:none"><span id="qt"></span></div>
  <button class="rbtn" id="rbtn" style="display:none" onclick="reset()">Try another shot</button>
</div>

<script>
let pitchX = 50, pitchY = 50;

function onPitch(e) {
  const svg = document.getElementById('pitch-svg');
  const r = svg.getBoundingClientRect();
  pitchX = ((e.clientX - r.left) / r.width) * 100;
  pitchY = ((e.clientY - r.top) / r.height) * 100;
  const dot = document.getElementById('pdot');
  dot.setAttribute('cx', (pitchX/100)*300);
  dot.setAttribute('cy', (pitchY/100)*200);
  dot.setAttribute('opacity','1');
  setTimeout(() => {
    document.getElementById('pitch-card').style.display = 'none';
    document.getElementById('goal-card').style.display = 'block';
    document.getElementById('s2').className = 'st done';
    document.getElementById('s3').className = 'st active';
  }, 280);
}

function onGoalTap(e) {
  const svg = document.getElementById('goal-svg');
  const r = svg.getBoundingClientRect();
  const cx = ((e.clientX - r.left) / r.width) * 400;
  const cy = ((e.clientY - r.top) / r.height) * 150;
  document.getElementById('smark').setAttribute('cx', cx);
  document.getElementById('smark').setAttribute('cy', cy);
  document.getElementById('smark').setAttribute('opacity','1');
  document.getElementById('sglow').setAttribute('cx', cx);
  document.getElementById('sglow').setAttribute('cy', cy);
  document.getElementById('sglow').setAttribute('opacity','0.2');
  const gx = Math.max(0, Math.min(100, (cx - 18) / 364 * 100));
  const gy = Math.max(0, Math.min(100, (cy - 22) / 94 * 100));
  document.getElementById('qt').textContent = buildQuip(pitchX, pitchY, gx, gy);
  document.getElementById('quip').style.display = 'flex';
  document.getElementById('rbtn').style.display = 'block';
  document.getElementById('s3').className = 'st done';
}

function buildQuip(px, py, gx, gy) {
  const vPos = gy < 40 ? 'top' : 'bottom';
  const hPos = gx < 25 ? 'left corner' : gx > 75 ? 'right corner' : 'centre';
  const map = {
    'top-left corner':     "Top left. Postage stamp. Keeper didn't move.",
    'top-centre':          "Right in the top bin.",
    'top-right corner':    "Top right. No chance.",
    'bottom-left corner':  "Rolled into the bottom left.",
    'bottom-centre':       "Low and central. Should've had it.",
    'bottom-right corner': "Far post. Bottom right. Placed.",
  };
  let base = map[`${vPos}-${hPos}`] || "Goes in.";
  if (px < 20 || px > 80) base += " Tight angle.";
  if (py > 75) base += " Point blank.";
  if (py < 20) base += " From distance.";
  return base;
}

function reset() {
  document.getElementById('pitch-card').style.display = 'block';
  document.getElementById('goal-card').style.display = 'none';
  document.getElementById('quip').style.display = 'none';
  document.getElementById('rbtn').style.display = 'none';
  document.getElementById('pdot').setAttribute('opacity','0');
  document.getElementById('smark').setAttribute('cx','-99');
  document.getElementById('smark').setAttribute('cy','-99');
  document.getElementById('sglow').setAttribute('cx','-99');
  document.getElementById('sglow').setAttribute('cy','-99');
  document.getElementById('s2').className = 'st active';
  document.getElementById('s3').className = 'st';
}
</script>
